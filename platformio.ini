[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit VEML7700 Library
    zinggjm/GxEPD2
    adafruit/Adafruit GFX Library

[env:display_value]
build_src_filter = -<*> +<display_value/*>
[env:rolling_hour]
build_src_filter = -<*> +<rolling_hour/*>
